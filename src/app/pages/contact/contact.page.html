<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Kontakt & Anfahrt</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="logo-container">
    <img src="assets/logo/tenne-logo.png" alt="Tenne Logo" />
  </div>

  <!-- Anfahrt -->
  <ion-card class="contact-card">
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="location-outline"></ion-icon> Anfahrt
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p>Annastraße 103</p>
      <p>41372 Niederkrüchten</p>
      <ion-button expand="block" fill="outline" color="primary" href="https://www.google.com/maps/dir/?api=1&destination=Annastraße+103,+41372+Niederkrüchten" target="_blank">
        <ion-icon name="navigate-outline" slot="start"></ion-icon>
        Route planen
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Kontakt -->
  <ion-card class="contact-card">
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="call-outline"></ion-icon> Kontakt
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p>
        <strong>E-Mail:</strong><br />
        <a href="mailto:office@tenne-treff.de">office&#64;tenne-treff.de</a>
      </p>
      <p>
        <strong>Telefon:</strong><br />
        <a href="tel:+4921633490039">02163 349 003 9</a>
      </p>
    </ion-card-content>
  </ion-card>
</ion-content>
