<ion-content class="ion-padding">
  <h1 class="kontakt-title">Kontakt & Anfahrt</h1>

  <!-- Anfahrt -->
  <ion-card class="kontakt-card">
    <ion-card-header>
      <ion-card-title><ion-icon name="location-outline"></ion-icon> Anfahrt</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="none">
        <ion-label>
          Annastraße 103<br />
          41372 Niederkrüchten
        </ion-label>
      </ion-item>
        <ion-button
          expand="block"
          color="primary"
          fill="outline"
          shape="round"
          href="https://www.google.com/maps/dir/?api=1&destination=Annastraße+103,+41372+Niederkrüchten"
          target="_blank"
        >
        <ion-icon name="navigate-outline" slot="start"></ion-icon>
        Route planen
      </ion-button>

    </ion-card-content>
  </ion-card>

  <!-- Kontakt -->
  <ion-card class="kontakt-card">
    <ion-card-header>
      <ion-card-title><ion-icon name="call-outline"></ion-icon> Kontakt</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item lines="none">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-label>office&#64;tenne-treff.de</ion-label>
      </ion-item>

      <ion-item lines="none">
        <ion-icon name="call" slot="start"></ion-icon>
        <ion-label>02163 349 003 9</ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
</ion-content>
